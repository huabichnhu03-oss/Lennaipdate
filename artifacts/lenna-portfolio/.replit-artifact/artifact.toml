kind = "web"
previewPath = "/"
title = "Lenna Portfolio"
version = "1.0.0"
id = "artifacts/lenna-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23920

[services.development]
run = "pnpm --filter @workspace/lenna-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lenna-portfolio", "run", "build" ]
publicDir = "artifacts/lenna-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23920"
BASE_PATH = "/"
